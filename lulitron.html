<style>
    .rating-box {
      width: 80%;
      margin: 20px auto;
      padding: 20px;
      background: #000000;
      border: 1px solid #ddd;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .rating-box label {
      display: block;
      margin-bottom: 10px;
      font-weight: bold;
      color: #fffefe;
    }

    input[type="range"] {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: #ddd;
      outline: none;
      accent-color: #4CAF50;
    }

    .value-text {
      margin-top: 15px;
      font-size: 1.4em;
      font-weight: bold;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .muito-ruim { color: #e74c3c; }
    .ruim       { color: #f39c12; }
    .medio      { color: #f1c40f; }
    .bom        { color: #2ecc71; }
    .muito-bom  { color: #27ae60; }
  </style>
</head>
<body>

  <div class="rating-box">
    <label>Como está a sua música?</label>
    <input type="range" id="slider" min="0" max="100" value="50" step="1">
    <div id="texto" class="value-text medio">Médio</div>
  </div>

  <script>
    const slider = document.getElementById('slider');
    const texto  = document.getElementById('texto');

    function atualizarTexto(valor) {
      let textoAvaliacao = "";
      let classe = "";

      if (valor <= 12) {
        textoAvaliacao = "Muito Ruim";
        classe = "muito-ruim";
      } else if (valor <= 37) {
        textoAvaliacao = "É...";
        classe = "ruim";
      } else if (valor <= 62) {
        textoAvaliacao = "...Tem coisa aí";
        classe = "medio";
      } else if (valor <= 87) {
        textoAvaliacao = "Massa!";
        classe = "bom";
      } else {
        textoAvaliacao = "Muito Boa! Parabéns!";
        classe = "muito-bom";
      }

      texto.textContent = textoAvaliacao;
      texto.className = `value-text ${classe}`;
    }

    slider.addEventListener('input', () => {
      atualizarTexto(parseInt(slider.value));
    });

    atualizarTexto(parseInt(slider.value));
  </script>

  



</body>
